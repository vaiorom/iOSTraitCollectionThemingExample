workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 60
    instance_type: mac_mini_m2
    scripts:
      - name: Build IPA
        script: | 
          xcode-project build-ipa \
            --project "ThemingExample.xcodeproj" \
            --scheme "ThemingExample" \
            --code-signing-method manual
    artifacts:
      - build/ios/ipa/*.ipa
